# Bank Statement Analyzer Configuration
# This file contains settings for the transaction categorization system

# Default LLM provider to use for categorization
default_provider = "gemini"

# LLM Provider Configurations
[providers.gemini]
api_key = ""  # Set your Gemini API key here or use BANK_ANALYZER_GEMINI_API_KEY env var
model_name = "gemini-1.5-flash"
temperature = 0.1
max_retries = 3
retry_delay = 1.0
batch_size = 50
timeout_seconds = 30
enabled = true

[providers.openai]
api_key = ""  # Set your OpenAI API key here or use BANK_ANALYZER_OPENAI_API_KEY env var
model_name = "gpt-3.5-turbo"
temperature = 0.1
max_retries = 3
retry_delay = 1.0
batch_size = 20
timeout_seconds = 30
enabled = false

[providers.anthropic]
api_key = ""  # Set your Anthropic API key here or use BANK_ANALYZER_ANTHROPIC_API_KEY env var
model_name = "claude-3-haiku-20240307"
temperature = 0.1
max_retries = 3
retry_delay = 1.0
batch_size = 10
timeout_seconds = 30
enabled = false

# Cache Configuration
[cache]
enabled = true
# cache_file = "~/.bank_analyzer/cache.db"  # Optional: override default location
max_age_days = 30
max_entries = 10000
cleanup_interval_hours = 24

# Category Configuration
[categories]
use_custom_categories = false
custom_categories = [
    # Examples of custom categories for Indian context
    # "Mobile Recharge",
    # "DTH Recharge",
    # "Metro Card",
    # "Petrol Pump",
    # "Medical Store",
    # "Kirana Store",
    # "Online Shopping - Fashion",
    # "Online Shopping - Electronics",
    # "Food Delivery - Zomato/Swiggy",
    # "Cab - Ola/Uber",
    # "EMI - Credit Card",
    # "EMI - Personal Loan",
    # "Mutual Funds SIP",
    # "Insurance Premium",
    # "School/College Fee",
    # "Rent Payment",
    # "Electricity Bill",
    # "Gas Bill",
    # "Internet Bill",
    # "Temple Donation"
]

# Processing Configuration
[processing]
include_reasoning = true
include_alternatives = false
parallel_processing = false
max_concurrent_requests = 3

# Logging Configuration
[logging]
level = "INFO"
# log_file = "~/.bank_analyzer/analyzer.log"  # Optional: log to file

# Example configurations for different use cases:

# High-volume processing configuration
[profiles.high_volume]
batch_size = 100
parallel_processing = true
max_concurrent_requests = 5
cache_max_entries = 50000

# Conservative API usage configuration
[profiles.conservative]
batch_size = 10
max_retries = 1
retry_delay = 2.0
parallel_processing = false

# Development/testing configuration
[profiles.development]
log_level = "DEBUG"
include_reasoning = true
include_alternatives = true
cache_enabled = false